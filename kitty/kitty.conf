# ============================================
#  Kitty — macOS / zsh + oh-my-zsh
# ============================================

# --- Fonts ---
# font_family      JetBrainsMono Nerd Font
# bold_font        auto
# italic_font      auto
# bold_italic_font auto
font_size 14.0
disable_ligatures cursor

# --- Theme (managed by `kitten themes`) ---
# BEGIN_KITTY_THEME
# Gruvbox Material Dark Medium
include current-theme.conf
# END_KITTY_THEME

# --- Cursor ---
cursor_shape beam
cursor_blink_interval 0.5
cursor_trail 1

# --- Scrollback ---
scrollback_lines 10000

# --- Window ---
window_padding_width 12 14
hide_window_decorations titlebar-only
macos_titlebar_color background
confirm_os_window_close 0
inactive_text_alpha 0.85

# --- Tab bar ---
tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}: {title}"

# --- Bell ---
enable_audio_bell no
visual_bell_duration 0.0

# --- macOS ---
macos_option_as_alt yes
macos_quit_when_last_window_closed yes

# --- Shell ---
shell_integration enabled

# --- Splits (iTerm/tmux-like) ---
enabled_layouts splits:split_axis=horizontal,stack
map cmd+d        launch --location=vsplit --cwd=current
map cmd+shift+d  launch --location=hsplit --cwd=current
map cmd+]        next_window
map cmd+[        previous_window

# --- New window/tab inherit cwd ---
map cmd+enter    launch --cwd=current
map cmd+t        launch --type=tab --cwd=current

# --- Tab nav ---
map cmd+left     previous_tab
map cmd+right    next_tab
map cmd+w        close_tab
map cmd+shift+w  close_window

# BEGIN_KITTY_FONTS
font_family      family='JetBrainsMono Nerd Font Mono' postscript_name=JetBrainsMonoNFM-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
